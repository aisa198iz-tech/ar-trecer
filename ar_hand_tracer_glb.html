<!DOCTYPE html>
<html>
<head>
    <title>AR Hand Tracer + GLB Dog</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body { margin: 0; font-family: Arial; }
        #container { position: relative; width: 100vw; height: 100vh; }
        #video { display: none; }
        canvas { display: block; }
        #info { position: absolute; top: 10px; left: 10px; color: white; background: rgba(0,0,0,0.5); padding: 10px; }
    </style>
</head>
<body>
    <div id="container">
        <video id="video" width="640" height="480" autoplay playsinline></video>
        <canvas id="output_canvas" style="position: absolute; top: 0; left: 0;"></canvas>
        <a-scene embedded arjs="sourceType: webcam;" id="ar-scene">
            <a-marker preset="hiro">
                <a-entity id="dog-model" gltf-model="url(https://github.com/KhronosGroup/glTF-Sample-Models/raw/master/2.0/Duck/glTF-Binary/Duck.glb)"
                          scale="0.05 0.05 0.05" 
                          material="color: #00ffff; transparent: true; opacity: 0.8"
                          animation="property: rotation; to: 0 360 0; loop: true; dur: 8000"
                          position="0 0.1 0"></a-entity>
            </a-marker>
            <a-entity camera></a-entity>
        </a-scene>
        <div id="info">
            Қолыңмен басқар: Көк ит (Duck GLB) пайда болады! ✋🐕✨
        </div>
    </div>

    <script>
        const videoElement = document.getElementById("video");
        const canvasElement = document.getElementById("output_canvas");
        const canvasCtx = canvasElement.getContext("2d");

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.5});
        hands.onResults(onResults);

        const camera = new Camera(videoElement, {onFrame: async () => await hands.send({image: videoElement}), width: 640, height: 480});
        camera.start();

        function onResults(results) {
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            if (results.multiHandLandmarks?.[0]) {
                const landmarks = results.multiHandLandmarks[0];
                const indexTip = landmarks[8];
                const screenX = indexTip.x * canvasElement.width;
                const screenY = indexTip.y * canvasElement.height;

                const dogModel = document.getElementById("dog-model");
                dogModel.setAttribute("position", `${(screenX / canvasElement.width - 0.5) * 2} ${(1 - screenY / canvasElement.height) * 1.5} 0`);

                drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {color: "#00ffff", lineWidth: 3});
                drawLandmarks(canvasCtx, landmarks, {color: "#00ffff", radius: 4});
            }
            canvasCtx.restore();
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
</body>
</html>
