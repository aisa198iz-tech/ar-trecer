<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Hand Tracer Vibe 🐕</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous" type="text/javascript"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body { margin: 0; background: #000; font-family: Arial, sans-serif; color: white; }
        #container { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
        #video { display: none; }
        #output_canvas { position: absolute; top: 0; left: 0; z-index: 1; }
        #info { position: absolute; top: 10px; left: 10px; background: rgba(0,100,255,0.8); padding: 15px; border-radius: 10px; z-index: 10; max-width: 300px; }
        #ar-scene { position: absolute; top: 0; left: 0; z-index: 2; width: 100%; height: 100%; }
        button { background: #00ffff; border: none; padding: 10px 20px; border-radius: 20px; color: #000; font-weight: bold; cursor: pointer; margin: 5px; }
        button:hover { background: #0099cc; }
    </style>
</head>
<body>
    <div id="container">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="output_canvas"></canvas>
        <a-scene id="ar-scene" embedded arjs="sourceType: webcam; debugUIEnabled: false;">
            <a-marker preset="hiro">
                <a-entity id="hologram-dog" 
                          gltf-model="url(https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Duck/glTF-Binary/Duck.glb)"
                          scale="0.03 0.03 0.03"
                          position="0 0.05 0"
                          rotation="-90 0 0"
                          material="color: #00ffff; transparent: true; opacity: 0.8; metalness: 0.9"
                          animation="property: rotation; to: 1 360 1; loop: true; dur: 10000; easing: linear">
                </a-entity>
            </a-marker>
            <a-entity light="type: ambient; color: #888;"></a-entity>
            <a-entity camera></a-entity>
        </a-scene>
        <div id="info">
            <h3>✋ AR Hand Tracer Vibe</h3>
            <p>Қолыңды камераға жақындат! Саусағыңмен итті басқар 🐕</p>
            <p>Hiro маркерін экранға көрсет немесе басып көр</p>
            <button onclick="toggleCamera()">Камера</button>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('output_canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 640;
        canvas.height = 480;

        const hands = new window.Hands({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
        }});

        hands.setOptions({
            maxNumHands: 2,
            modelComplexity: 1,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        hands.onResults((results) => {
            ctx.save();
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);

            if (results.multiHandLandmarks) {
                for (const landmarks of results.multiHandLandmarks) {
                    drawConnectors(ctx, landmarks, HAND_CONNECTIONS, {color: '#00ffff', lineWidth: 5});
                    drawLandmarks(ctx, landmarks, {color: '#00ffff', lineWidth: 3, radius: 5});

                    // Интерактив: index саусақ
                    const indexTip = landmarks[8];
                    const x = (indexTip.x * canvas.width - canvas.width / 2) / 100;
                    const y = -(indexTip.y * canvas.height - canvas.height / 2) / 100;

                    const hologram = document.getElementById('hologram-dog');
                    if (hologram) {
                        hologram.setAttribute('position', `${x} ${y} 0`);
                    }
                }
            }
            ctx.restore();
        });

        const camera = new Camera(video, {
            onFrame: async () => {
                await hands.send({image: video});
            },
            width: 640,
            height: 480
        });

        window.toggleCamera = async () => {
            if (camera.button?.state === 0) {
                camera.stop();
            } else {
                camera.start();
            }
        };

        camera.start();
    </script>
</body>
</html>
